version: '3.8'

# =============================================================================
# Mektep Scraper - Simplified Architecture
# =============================================================================
# - Nginx: Reverse proxy, SSL termination, rate limiting
# - Web: Flask app (auth, API, admin panel)
# - PostgreSQL: Main database
#
# Scraping, Word/Excel generation, AI text - handled by desktop app
# =============================================================================

services:
  # =============================================================================
  # Nginx Reverse Proxy
  # =============================================================================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./updates:/var/www/mektep/updates:ro
      # Uncomment for SSL:
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - mektep-network

  # =============================================================================
  # Main Web Application
  # =============================================================================
  web:
    build: .
    # Port exposed only internally (nginx proxy)
    expose:
      - "5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://mektep:${POSTGRES_PASSWORD:-mektep123}@db:5432/mektep_db
      # Disable Celery/Redis (not needed in simplified architecture)
      - USE_CELERY=0
      - UPLOAD_ROOT=/app/data/uploads
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_JSON=${LOG_JSON:-1}
      - SLOW_SQL_MS=${SLOW_SQL_MS:-500}
      - SLOW_REQUEST_MS=${SLOW_REQUEST_MS:-1000}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    labels:
      service: mektep-web
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./data:/app/data
      - ./instance:/app/instance
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mektep-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # =============================================================================
  # PostgreSQL Database
  # =============================================================================
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=mektep
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mektep123}
      - POSTGRES_DB=mektep_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # Port not exposed externally for security.
    # Accessible only within Docker network (mektep-network).
    # For local debugging, uncomment:
    # ports:
    #   - "5432:5432"
    restart: unless-stopped
    networks:
      - mektep-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mektep -d mektep_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Node Exporter (system metrics: CPU, RAM, disk, network)
  # =============================================================================
  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - mektep-network

  # =============================================================================
  # Prometheus (metrics collection)
  # =============================================================================
  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    depends_on:
      - web
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks:
      - mektep-network
    restart: unless-stopped

  # =============================================================================
  # Grafana (dashboards)
  # =============================================================================
  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - mektep-network
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./deploy/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - mektep-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - ./deploy/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - mektep-network
    restart: unless-stopped

  # =============================================================================
  # Async exports (optional): docker compose --profile async up
  # =============================================================================
  redis:
    profiles: ["async"]
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - mektep-network

  worker:
    profiles: ["async"]
    build: .
    command: celery -A webapp.celery_app worker --loglevel=info --pool=solo
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://mektep:${POSTGRES_PASSWORD:-mektep123}@db:5432/mektep_db
      - USE_CELERY=1
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - UPLOAD_ROOT=/app/data/uploads
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_JSON=${LOG_JSON:-1}
      - SLOW_SQL_MS=${SLOW_SQL_MS:-500}
      - SENTRY_DSN=${SENTRY_DSN:-}
    volumes:
      - ./data:/app/data
      - ./instance:/app/instance
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - mektep-network

volumes:
  postgres-data:
  grafana-data:
  loki-data:

networks:
  mektep-network:
    driver: bridge
